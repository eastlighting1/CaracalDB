name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            .python-version
            pyproject.toml
            Cargo.toml
            crates/**/Cargo.toml
            hatch.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra docs --extra io

      - name: Ruff
        run: uv run ruff check bench caracaldb tests tools

      - name: Black
        run: uv run black --check bench caracaldb tests tools

      - name: Generate docs indexes
        run: |
          uv run python tools/gen_errors.py
          uv run python tools/gen_builtins.py
          uv run python tools/gen_tuft_grammar.py
          uv run python tools/gen_symbol_index.py
          uv run python tools/check_error_pages.py
          uv run python tools/check_docs_metadata.py
          uv run python tools/check_public_api_examples.py
          git diff --exit-code -- docs/errors/index.md docs/tuft/builtins.md docs/tuft/grammar.lark docs/api/symbols.json

      - name: Documentation code blocks
        run: uv run python tools/check_docs_code_blocks.py

      - name: MkDocs
        run: uv run mkdocs build --strict -f mkdocs.yml

      - name: Mypy (advisory)
        continue-on-error: true
        run: uv run mypy caracaldb

  python:
    name: Python / py${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            .python-version
            pyproject.toml
            Cargo.toml
            crates/**/Cargo.toml
            hatch.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install flatc
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler

      - name: Verify flatc
        run: flatc --version

      - name: Install dependencies
        run: uv sync --extra dev --extra io

      - name: Import smoke test
        run: uv run python -c "import caracaldb; print(caracaldb.__version__)"

      - name: Pytest
        run: uv run pytest -x -q

      - name: Build Rust extension smoke
        if: matrix.python-version == '3.12'
        run: |
          uv run maturin develop
          uv run python -c "import caracaldb._caracaldb_rust as r; print(r.rust_engine_version())"

  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Rust workspace
        id: rust-workspace
        shell: bash
        run: |
          if [[ -f Cargo.toml ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml found; skipping Rust checks until the Rust engine crate lands."
          fi

      - name: Install Rust toolchain
        if: steps.rust-workspace.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        if: steps.rust-workspace.outputs.present == 'true'
        run: cargo fmt --all --check

      - name: Cargo clippy
        if: steps.rust-workspace.outputs.present == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test core
        if: steps.rust-workspace.outputs.present == 'true'
        run: cargo test -p caracaldb-core --all-targets
