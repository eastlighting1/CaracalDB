name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            .python-version
            pyproject.toml
            hatch.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra io

      - name: Ruff
        run: uv run ruff check bench caracaldb tests

      - name: Black
        run: uv run black --check bench caracaldb tests

      - name: Mypy (advisory)
        continue-on-error: true
        run: uv run mypy caracaldb

  python:
    name: Python / py${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            .python-version
            pyproject.toml
            hatch.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install flatc
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler

      - name: Verify flatc
        run: flatc --version

      - name: Install dependencies
        run: uv sync --extra dev --extra io

      - name: Import smoke test
        run: uv run python -c "import caracaldb; print(caracaldb.__version__)"

      - name: Pytest
        run: uv run pytest -x -q

  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Rust workspace
        id: rust-workspace
        shell: bash
        run: |
          if [[ -f Cargo.toml ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml found; skipping Rust checks until the Rust engine crate lands."
          fi

      - name: Install Rust toolchain
        if: steps.rust-workspace.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        if: steps.rust-workspace.outputs.present == 'true'
        run: cargo fmt --all --check

      - name: Cargo clippy
        if: steps.rust-workspace.outputs.present == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        if: steps.rust-workspace.outputs.present == 'true'
        run: cargo test --workspace --all-targets
