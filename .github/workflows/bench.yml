name: Bench

on:
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Run benchmark suite
        id: bench
        run: |
          uv run --with pytest python -c "
          import json, pathlib
          from bench.harness import run_all, write_results
          results = run_all()
          write_results(pathlib.Path('bench/results/latest.json'), results)
          print(json.dumps(results, indent=2))
          "
      - name: Compare against baseline
        run: |
          uv run --with pytest python -c "
          import json, pathlib, sys
          from bench.harness import compare_against_baseline
          baseline = json.loads(pathlib.Path('bench/results/baseline.json').read_text())
          latest = json.loads(pathlib.Path('bench/results/latest.json').read_text())
          regressions = compare_against_baseline(latest, baseline, tolerance=0.30)
          if regressions:
              print('REGRESSIONS:')
              for line in regressions:
                  print(' -', line)
              sys.exit(1)
          print('No regressions detected.')
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-results
          path: bench/results/latest.json
