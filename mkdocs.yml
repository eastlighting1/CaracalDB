site_name: CaracalDB
site_description: Documentation for CaracalDB, an embedded GraphDB with a Python reference engine and planned Rust core.
site_url: https://caracaldb.dev/
repo_url: https://github.com/eastlighting1/CaracalDB
docs_dir: docs
site_dir: site
strict: true
exclude_docs: |
  01_language_spec.md
  02_engine_spec.md
  03_user_modeling_case_study.md
  04_caracaldb_implementation.md
  05_wbs.md
  _generated/**
  errors/TF-INDEX.md
  errors/README.md
  milestones/**
  format/csr.md
  legacy/**
  release/**

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: slate
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: slate
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - section-index
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            docstring_style: numpy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets

