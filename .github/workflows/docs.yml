name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "caracaldb/**"
      - "tools/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            .python-version
            pyproject.toml
            hatch.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra docs --extra io

      - name: Generate docs indexes
        run: |
          uv run python tools/gen_errors.py
          uv run python tools/gen_builtins.py
          uv run python tools/gen_tuft_grammar.py
          uv run python tools/gen_milestones.py
          uv run python tools/gen_symbol_index.py
          uv run python tools/check_error_pages.py
          uv run python tools/check_docs_metadata.py
          uv run python tools/check_public_api_examples.py
          uv run python tools/check_docs_code_blocks.py
          git diff --exit-code -- docs/errors/index.md docs/tuft/builtins.md docs/tuft/grammar.lark docs/developers/milestones.md docs/api/symbols.json

      - name: Build MkDocs site
        run: uv run mkdocs build --strict -f mkdocs.yml

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy docs
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
